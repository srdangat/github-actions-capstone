name: Main Branch Pipeline

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  build-test:
    name: Build & Test
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      node_version: '20'
      run_tests: true


  generate-sha:
    name: Generate Short SHA
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.vars.outputs.short_sha }}

    steps:
      - name: Create short commit SHA
        id: vars
        run: |
          echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT


  docker-build:
    name: Docker Build & Push
    needs: [build-test, generate-sha]
    uses: ./.github/workflows/reusable-docker.yml
    with:
      image_name: node-app
      tag: sha-${{ needs.generate-sha.outputs.short_sha }}
    secrets:
      docker_username: ${{ vars.DOCKER_USERNAME }}
      docker_token: ${{ secrets.DOCKERHUB_TOKEN }}

  trivy-scan:
    name: Trivy Vulnerability Scan
    runs-on: ubuntu-latest
    needs: [docker-build, generate-sha]

    steps:
      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v2
        with:
          image-ref: ${{ vars.DOCKER_USERNAME }}/node-app:sha-${{ needs.generate-sha.outputs.short_sha }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1
          trivy-ignores: ${{ github.workspace }}/.trivyignore

      - name: Upload Trivy scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-scan-report
          path: trivy-report.txt


  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: trivy-scan

    steps:
      - name: Deploy image
        run: |
          echo "Deploying image: ${{ needs.docker-build.outputs.image_url }} to production"
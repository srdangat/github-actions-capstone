name: Reusable — Docker Build & Push

on:
  workflow_call:
    inputs:
      image_name:
        description: 'Docker image name'
        type: string
        required: true
      tag:
        description: 'Image tag'
        type: string
        required: true
    secrets:
      docker_username:
        description: 'Docker Hub username'
        required: true
      docker_token:
        description: 'Docker Hub access token'
        required: true
    outputs:
      image_url:
        description: 'Full image path with tag'
        value: ${{ jobs.docker-build-push.outputs.image_url }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  docker-build-push:
    name: Docker Build & Push (${{ inputs.tag }})
    runs-on: ubuntu-latest

    outputs:
      image_url: ${{ steps.set-image-url.outputs.image_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.docker_username }}
          password: ${{ secrets.docker_token }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ vars.DOCKER_USERNAME }}/${{ inputs.image_name }}:${{ inputs.tag }}
            ${{ vars.DOCKER_USERNAME }}/${{ inputs.image_name }}:latest


      - name: Set image_url output
        id: set-image-url
        run: |
          echo "image_url=${{ inputs.image_name }}:${{ inputs.tag }}" >> "$GITHUB_OUTPUT"

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ vars.DOCKER_USERNAME }}/${{ inputs.image_name }}:${{ inputs.tag }}
          format: table
          output: trivy-report.txt
          severity: CRITICAL
          exit-code: 1

      - name: Upload Trivy scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-scan-report
          path: trivy-report.txt